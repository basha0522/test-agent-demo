name: Generate Unit Tests & Coverage

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  models: read

concurrency:
  group: test-agent-workflow
  cancel-in-progress: false

jobs:
  test-agent:
    # Only run for REAL merges into main, and never for the bot's own generated-tests PR.
    # Two independent guards (branch name + label) so one bypass alone can't cause a loop.
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref != 'auto/generated-tests' &&
      !contains(github.event.pull_request.labels.*.name, 'automated-pr')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0   # needed so git diff can compare against the merge base

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Find changed source files
        id: changed
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'src/**/*.ts' 'src/**/*.js' | grep -v '\.test\.' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          if [ -z "$FILES" ]; then
            echo "has_files=false" >> $GITHUB_OUTPUT
          else
            echo "has_files=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate unit tests via GitHub Models
        if: steps.changed.outputs.has_files == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: node scripts/generate-tests.js

      - name: Run tests with coverage
        id: run_tests
        if: steps.changed.outputs.has_files == 'true'
        continue-on-error: true   # don't kill the job on test failure — we still want to report and open a PR
        run: |
          npm test -- --coverage --json --outputFile=test-results.json 2>&1 | tee test-output.txt

      - name: Build Actions run summary
        if: steps.changed.outputs.has_files == 'true' && always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 40 test-output.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No test output found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Coverage (informational only — not a merge gate)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage/coverage-summary.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No coverage summary found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Read test summary for PR body
        if: steps.changed.outputs.has_files == 'true' && always()
        id: summary
        run: |
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          tail -n 40 test-output.txt >> $GITHUB_OUTPUT 2>/dev/null || echo "No test output found" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload coverage report
        if: steps.changed.outputs.has_files == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Create Pull Request
        if: steps.changed.outputs.has_files == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-generate unit tests"
          branch: auto/generated-tests
          delete-branch: true
          title: "🤖 Auto-generated unit tests"
          body: |
            Auto-generated by the test-agent workflow after the last merge into `main`.

            **Please review before merging — do not auto-merge.**

            <details>
            <summary>Test run output</summary>

            ```
            ${{ steps.summary.outputs.summary }}
            ```
            </details>

            Coverage report attached as a workflow artifact for reference only —
            this PR is not required to meet a coverage threshold.
          labels: automated-pr
