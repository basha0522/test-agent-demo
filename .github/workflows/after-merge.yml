name: Generate Unit Tests & Coverage

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write   # ← new: needed to open a PR
  models: read

jobs:
  test-agent:
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate unit tests via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-tests.js

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: auto-generate unit tests"
          branch: auto/generated-tests
          delete-branch: true
          title: "🤖 Auto-generated unit tests"
          body: |
            This PR was created automatically by the test-agent workflow after the last merge into `main`.

            - Tests generated via GitHub Models
            - Coverage report available in the workflow run artifacts

            Please review before merging.
          labels: automated-pr
