name: Generate Unit Tests & Coverage

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  test-agent:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed if we commit generated tests back
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate unit tests via agent API
        env:
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
        run: node scripts/generate-tests.js

      - name: Commit generated tests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "*.test.ts"
          git diff --cached --quiet || git commit -m "chore: auto-generate unit tests [skip ci]"
          git push

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/